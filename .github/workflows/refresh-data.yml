name: Refresh Erdos wiki data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: ["master"]

permissions:
  contents: write

concurrency:
  group: refresh-erdos-data
  cancel-in-progress: false

jobs:
  refresh:
    if: ${{ !(github.event_name == 'push' && github.actor == 'github-actions[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository without marketplace actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            .

      - name: Verify Node.js is available on the runner
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Rebuild dataset
        run: node build-data.mjs

      - name: Commit regenerated files
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if git diff --quiet -- app-data.js wiki-source.md; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-data.js wiki-source.md
          git commit -m "chore: refresh Erdos wiki data"
          git push origin "HEAD:${BRANCH_NAME}"
