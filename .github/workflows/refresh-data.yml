name: Refresh Erdos wiki data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-erdos-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild dataset
        run: node build-data.mjs

      - name: Commit regenerated files
        run: |
          if git diff --quiet -- app-data.js wiki-source.md; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-data.js wiki-source.md
          git commit -m "chore: refresh Erdos wiki data"
          git push
