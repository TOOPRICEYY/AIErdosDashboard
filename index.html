<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix Multiplication vs Paul Erdos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Matrix Multiplication vs Paul Erdos</h1>
      <div id="source-line" class="source-line"></div>
    </header>

    <main class="app-shell">
      <section class="panel graph-panel">
        <div class="panel-heading">
          <div>
            <h2>Cumulative Solved Problems</h2>
            <p id="timeline-subhead" class="subhead"></p>
          </div>
        </div>

        <div class="chart-frame chart-frame-main">
          <svg id="timeline-chart" aria-label="Cumulative solved problem timeline"></svg>
          <div id="chart-tooltip" class="chart-tooltip" hidden></div>
        </div>
        <div id="timeline-legend" class="legend-row"></div>
      </section>

      <aside class="panel config-panel" aria-label="Graph configuration">
        <h2>Graph Configuration</h2>

        <label class="field">
          <span>Problem set</span>
          <select id="problem-set-select">
            <option value="autonomous-full">Fully autonomous complete solutions</option>
            <option value="assisted-full">Assisted + autonomous complete solutions</option>
            <option value="partial">Partial solutions</option>
            <option value="advanced">Advanced filter</option>
          </select>
        </label>

        <div class="field">
          <span id="date-axis-label">Date axis</span>
          <button
            id="date-mode-toggle"
            class="date-mode-button"
            type="button"
            aria-label="Date axis: Switch to Effectively Solvable Date"
            aria-pressed="false"
          >
            Switch to Effectively Solvable Date
          </button>
        </div>

        <label class="field">
          <span>Model bars</span>
          <select id="model-group-select">
            <option value="family">Group by model family</option>
            <option value="model">Group by model</option>
          </select>
        </label>

        <label class="field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Problem, model, note" />
        </label>

        <div class="field reset-field">
          <span>Actions</span>
          <button id="reset-filters" class="button" type="button">Reset filters</button>
        </div>

        <details id="advanced-filter-box" class="advanced-box">
          <summary>Advanced section/outcome filter</summary>
          <div id="advanced-filter-grid" class="advanced-grid"></div>
        </details>
      </aside>

      <section id="stats-grid" class="stats-grid" aria-label="Current filter statistics"></section>

      <section class="panel model-panel">
        <div class="panel-heading">
          <div>
            <h2>Contributions by Model</h2>
            <p id="model-family-subhead" class="subhead"></p>
          </div>
        </div>
        <div class="chart-frame chart-frame-bar">
          <svg id="model-family-chart" aria-label="Stacked model contribution chart"></svg>
        </div>
        <div id="model-family-legend" class="legend-row"></div>
      </section>

      <section class="panel category-panel">
        <div class="panel-heading">
          <div>
            <h2>Contribution Category</h2>
            <p id="category-subhead" class="subhead"></p>
          </div>
        </div>
        <div class="chart-frame chart-frame-donut">
          <svg id="category-chart" aria-label="Contribution category chart"></svg>
        </div>
        <div id="category-legend" class="legend-row legend-column"></div>
      </section>

      <section class="panel detail-panel">
        <div class="panel-heading">
          <div>
            <h2>Problem Details</h2>
            <p id="table-summary" class="subhead"></p>
          </div>
          <button id="clear-selection" class="button" type="button">Show all</button>
        </div>

        <div id="selection-summary" class="selection-summary"></div>

        <div class="table-tools">
          <label class="field table-search">
            <span>Filter table</span>
            <input id="table-filter-input" type="search" placeholder="Filter visible rows" />
          </label>
          <details class="column-picker">
            <summary>Columns</summary>
            <div id="column-controls" class="column-controls"></div>
          </details>
        </div>

        <div class="table-container">
          <table id="data-table" class="data-table">
            <thead>
              <tr id="table-head-row"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
